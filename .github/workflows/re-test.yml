name: Test

on: [workflow_call]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ matrix.node-version }}
          turbo-cache-prefix: test

      - name: Install dependencies
        run: pnpm install

      - name: Run tests with coverage
        run: pnpm test:coverage
        env:
          CI: true
          TURBO_API: ${{ secrets.TURBO_API }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

      - name: Generate coverage summary
        if: always()
        run: |
          {
            echo "## Test Coverage Summary"
            echo ""
            echo '```'

            # Extract coverage summary from output
            if [ -f coverage/coverage-summary.json ]; then
              node -e "
                const fs = require('fs');
                const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
                const total = coverage.total;

                const formatPercent = (pct) => {
                  const color = pct >= 90 ? '🟢' : pct >= 80 ? '🟡' : '🔴';
                  return \`\${color} \${pct.toFixed(2)}%\`;
                };

                console.log('Coverage Summary:');
                console.log('');
                console.log('Statements  :', formatPercent(total.statements.pct));
                console.log('Branches    :', formatPercent(total.branches.pct));
                console.log('Functions   :', formatPercent(total.functions.pct));
                console.log('Lines       :', formatPercent(total.lines.pct));
              "
            else
              echo "Coverage report not found"
            fi

            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
